<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Bilhetes - Brasileirão</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f1115;
      color: #f5f7fa;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .card {
      background: #181c23;
      border: 1px solid #2a313d;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #c7d0db;
    }

    select, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      font-size: 15px;
    }

    select {
      background: #0f172a;
      color: #f8fafc;
    }

    button {
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .muted {
      color: #9aa7b8;
      font-size: 14px;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: #93c5fd;
    }

    .error {
      background: #3a1616;
      border: 1px solid #7f1d1d;
      color: #fecaca;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
    }

    .success {
      background: #10261a;
      border: 1px solid #166534;
      color: #bbf7d0;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
    }

    .game-row {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #27303c;
    }

    .game-row:last-child {
      border-bottom: none;
    }

    .game-name {
      font-size: 15px;
      font-weight: 600;
    }

    .ticket {
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      background: #111827;
    }

    .ticket-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #334155;
    }

    .pick-item {
      padding: 12px 0;
      border-bottom: 1px solid #243041;
    }

    .pick-item:last-child {
      border-bottom: none;
    }

    .pick-game {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .pick-line {
      font-size: 15px;
      margin-bottom: 4px;
    }

    .pick-confidence {
      font-size: 13px;
      color: #93c5fd;
    }

    .fixacoes-list {
      margin-top: 10px;
      padding-left: 18px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 700px) {
      .game-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gerador de Bilhetes - Brasileirão</h1>

    <div class="card">
      <h2>Configuração</h2>

      <div class="grid">
        <div>
          <label for="qtd">Quantidade de bilhetes</label>
          <select id="qtd">
            <option value="1">1 bilhete</option>
            <option value="2">2 bilhetes</option>
            <option value="3">3 bilhetes</option>
            <option value="5">5 bilhetes</option>
            <option value="10">10 bilhetes</option>
          </select>
        </div>

        <div>
          <label for="modo">Tipo de bilhete</label>
          <select id="modo">
            <option value="misto">Misto</option>
            <option value="seco">Seco</option>
            <option value="protecao">Proteção</option>
          </select>
        </div>

        <!-- 🔥 NOVO CAMPO -->
        <div>
          <label for="tipo_dupla">Tipo de dupla chance</label>
          <select id="tipo_dupla">
            <option value="padrao">Padrão (modelo decide)</option>
            <option value="evitar_12">Evitar 12 (usar só 1X / X2)</option>
          </select>
        </div>

      </div>

      <div style="margin-top: 16px;">
        <button id="btnGerar">Gerar bilhetes</button>
      </div>

      <div id="status" class="status"></div>
      <div id="mensagemErro" class="error hidden"></div>
      <div id="mensagemSucesso" class="success hidden"></div>
    </div>

    <div class="card">
      <h2>Fixar palpites manualmente</h2>
      <div id="gamesContainer"></div>
    </div>

    <div class="card">
      <h2>Resultados</h2>
      <div id="resultsContainer"></div>
    </div>
  </div>

<script>

const API_BASE = "https://py-futebol.onrender.com";

const gamesContainer = document.getElementById("gamesContainer");
const resultsContainer = document.getElementById("resultsContainer");
const btnGerar = document.getElementById("btnGerar");

async function carregarJogos(){
  const r = await fetch(`${API_BASE}/games`);
  const data = await r.json();

  gamesContainer.innerHTML = data.detalhes.map(g=>`
    <div class="game-row">
      <div>${g.label}</div>
      <select data-jogo="${g.label}">
        <option value="">Auto</option>
        <option value="${g.home}">${g.home}</option>
        <option value="Empate">Empate</option>
        <option value="${g.away}">${g.away}</option>
      </select>
    </div>
  `).join("");
}

function getFixacoes(){
  const arr=[]
  document.querySelectorAll("[data-jogo]").forEach(s=>{
    if(s.value){
      arr.push({ jogo:s.dataset.jogo, escolha:s.value })
    }
  })
  return arr
}

async function gerarBilhetes(){

  const qtd = document.getElementById("qtd").value;
  const modo = document.getElementById("modo").value;
  const tipo_dupla = document.getElementById("tipo_dupla").value;

  const r = await fetch(`${API_BASE}/generate?qtd=${qtd}&modo=${modo}&tipo_dupla=${tipo_dupla}`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ fixacoes: getFixacoes() })
  });

  const data = await r.json();

  resultsContainer.innerHTML = data.bilhetes.map((b,i)=>`
    <div class="ticket">
      <h3>Bilhete ${i+1}</h3>
      ${b.jogos.map(j=>`
        <div class="pick-item">
          <div class="pick-game">${j.jogo}</div>
          ${j.palpite} <span class="badge">${j.mercado}</span>
        </div>
      `).join("")}
    </div>
  `).join("");
}

btnGerar.onclick = gerarBilhetes;

carregarJogos();

</script>

</body>
</html>
